<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX CAPITAL — Market Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --apex-black: #080a0e;
            --apex-dark: #0d1117;
            --apex-card: #111620;
            --apex-border: #1e2d40;
            --apex-gold: #f0a500;
            --apex-gold-dim: #9a6a00;
            --apex-green: #00ff94;
            --apex-red: #ff2d55;
            --apex-blue: #0af;
            --apex-muted: #4a5568;
            --apex-text: #c8d6e5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--apex-black);
            color: var(--apex-text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        /* TICKER */
        .ticker-wrap { background: var(--apex-gold); overflow: hidden; height: 28px; display: flex; align-items: center; }
        .ticker-track { display: flex; animation: ticker 50s linear infinite; white-space: nowrap; }
        @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        .ticker-item { font-family: 'Space Mono', monospace; font-size: 11px; color: #000; font-weight: 700; padding: 0 20px; }
        .t-up { color: #005522; }
        .t-down { color: #880011; }

        /* HEADER */
        header {
            background: var(--apex-dark);
            border-bottom: 1px solid var(--apex-border);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 28px; letter-spacing: 4px; color: var(--apex-gold); text-shadow: 0 0 20px rgba(240,165,0,0.3); }
        .logo span { color: #fff; }
        .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--apex-green); box-shadow: 0 0 8px var(--apex-green); animation: pulse 2s infinite; display: inline-block; margin-right: 6px; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .live-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--apex-green); }
        .clock { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--apex-muted); }

        /* SEARCH */
        .search-bar {
            background: var(--apex-dark);
            border-bottom: 1px solid var(--apex-border);
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-bar input {
            background: var(--apex-card);
            border: 1px solid var(--apex-border);
            color: #fff;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            padding: 8px 14px;
            border-radius: 3px;
            outline: none;
            width: 180px;
            text-transform: uppercase;
            transition: border-color 0.2s;
        }
        .search-bar input:focus { border-color: var(--apex-gold); }
        .search-bar input::placeholder { color: var(--apex-muted); text-transform: none; }
        .btn-track {
            background: var(--apex-gold); color: #000;
            font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
            padding: 8px 16px; border: none; border-radius: 3px; cursor: pointer;
            letter-spacing: 1px; transition: background 0.15s;
        }
        .btn-track:hover { background: #ffd740; }
        .updated-label { margin-left: auto; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--apex-muted); }

        /* LAYOUT */
        .app-body { display: flex; height: calc(100vh - 118px); overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--apex-dark);
            border-right: 1px solid var(--apex-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-hdr {
            padding: 12px 16px;
            border-bottom: 1px solid var(--apex-border);
            display: flex;
            justify-content: space-between;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--apex-gold);
            letter-spacing: 2px;
            flex-shrink: 0;
        }
        .watchlist { overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: var(--apex-border) transparent; }

        .stock-card {
            padding: 13px 16px;
            border-bottom: 1px solid var(--apex-border);
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .stock-card::before { content:''; position:absolute; left:0;top:0;bottom:0;width:3px; background:transparent; transition:background 0.2s; }
        .stock-card:hover { background: rgba(240,165,0,0.04); }
        .stock-card:hover::before { background: var(--apex-gold-dim); }
        .stock-card.active { background: rgba(240,165,0,0.08); }
        .stock-card.active::before { background: var(--apex-gold); }
        .sc-row1 { display: flex; justify-content: space-between; align-items: baseline; }
        .sc-sym { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: #fff; }
        .sc-price { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; }
        .sc-name { font-size: 10px; color: var(--apex-muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
        .sc-chg { font-family: 'Space Mono', monospace; font-size: 10px; }
        .sc-badge { display: inline-block; margin-top: 6px; padding: 1px 7px; border-radius: 2px; font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 1px; }
        .b-STRONG-BUY  { background:rgba(0,255,148,0.2); color:var(--apex-green); border:1px solid rgba(0,255,148,0.4); }
        .b-BUY         { background:rgba(0,255,148,0.1); color:var(--apex-green); border:1px solid rgba(0,255,148,0.25); }
        .b-WATCH       { background:rgba(0,170,255,0.1); color:var(--apex-blue);  border:1px solid rgba(0,170,255,0.25); }
        .b-HOLD        { background:rgba(240,165,0,0.1); color:var(--apex-gold);  border:1px solid rgba(240,165,0,0.25); }
        .b-SELL        { background:rgba(255,45,85,0.1); color:var(--apex-red);   border:1px solid rgba(255,45,85,0.25); }
        .b-STRONG-SELL { background:rgba(255,45,85,0.2); color:var(--apex-red);   border:1px solid rgba(255,45,85,0.4); }
        .up { color: var(--apex-green); }
        .dn { color: var(--apex-red); }
        .nt { color: var(--apex-muted); }

        /* MAIN CONTENT */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* CHART PANEL */
        .chart-panel { background: var(--apex-card); border-bottom: 1px solid var(--apex-border); padding: 20px 24px; flex-shrink: 0; }
        .chart-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .ch-sym { font-family: 'Bebas Neue', cursive; font-size: 38px; color: #fff; letter-spacing: 3px; line-height: 1; }
        .ch-name { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--apex-muted); margin-top: 3px; }
        .ch-price { font-family: 'Space Mono', monospace; font-size: 32px; font-weight: 700; color: #fff; text-align: right; }
        .ch-chg { font-family: 'Space Mono', monospace; font-size: 13px; text-align: right; margin-top: 3px; }
        .chart-wrap { height: 200px; position: relative; }
        .stats-row { display: grid; grid-template-columns: repeat(4,1fr); border-top: 1px solid var(--apex-border); margin-top: 14px; }
        .stat { padding: 10px 14px; border-right: 1px solid var(--apex-border); }
        .stat:last-child { border-right: none; }
        .stat-lbl { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--apex-muted); letter-spacing: 1px; }
        .stat-val { font-family: 'Space Mono', monospace; font-size: 13px; color: #fff; margin-top: 3px; }

        /* ANALYSIS PANEL */
        .analysis-panel { flex: 1; display: flex; overflow: hidden; }

        /* LEFT: signals */
        .sig-col {
            width: 260px;
            min-width: 260px;
            border-right: 1px solid var(--apex-border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--apex-border) transparent;
        }
        .sig-hdr { padding: 10px 14px; border-bottom: 1px solid var(--apex-border); font-family: 'Space Mono', monospace; font-size: 10px; color: var(--apex-gold); letter-spacing: 2px; flex-shrink: 0; }

        .rec-block { padding: 20px 14px; border-bottom: 1px solid var(--apex-border); text-align: center; }
        .rec-lbl { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--apex-muted); letter-spacing: 2px; margin-bottom: 6px; }
        #bigRec { font-family: 'Bebas Neue', cursive; font-size: 52px; letter-spacing: 3px; line-height: 1; color: var(--apex-muted); transition: color 0.3s; }
        .score-bar { height: 5px; background: var(--apex-border); border-radius: 3px; margin: 10px auto 0; max-width: 160px; overflow: hidden; }
        .score-fill { height: 100%; border-radius: 3px; width: 0%; transition: width 0.8s cubic-bezier(.16,1,.3,1); }
        .score-lbl { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--apex-muted); margin-top: 5px; }

        .tech-block { padding: 12px 14px; }
        .tech-lbl { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--apex-muted); letter-spacing: 2px; margin-bottom: 8px; }
        .sig-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(30,45,64,0.4); }
        .sig-row:last-child { border-bottom: none; }
        .sig-name { font-size: 11px; color: var(--apex-text); }
        .sig-val { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; }

        /* RIGHT: analyst brief */
        .brief-col { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--apex-border) transparent; }
        .brief-hdr {
            padding: 10px 18px;
            border-bottom: 1px solid var(--apex-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brief-hdr-lbl { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--apex-gold); letter-spacing: 2px; }
        .algo-badge { font-family: 'Space Mono', monospace; font-size: 9px; background: rgba(240,165,0,0.1); border: 1px solid rgba(240,165,0,0.25); color: var(--apex-gold); padding: 2px 8px; border-radius: 2px; }

        .brief-body { padding: 18px; }
        .brief-section { margin-bottom: 16px; }
        .brief-section-title { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--apex-muted); letter-spacing: 2px; margin-bottom: 6px; }
        .brief-section-body { font-size: 12px; line-height: 1.85; color: var(--apex-text); }
        .bb-up { color: var(--apex-green); font-weight: 600; }
        .bb-dn { color: var(--apex-red); font-weight: 600; }
        .bb-nt { color: var(--apex-gold); font-weight: 600; }

        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 160px;
            gap: 8px;
            color: var(--apex-muted);
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--apex-border); border-radius: 2px; }

        @media (max-width: 800px) {
            .app-body { flex-direction: column; height: auto; overflow: auto; }
            .sidebar { width: 100%; min-width: unset; height: auto; max-height: 280px; border-right: none; border-bottom: 1px solid var(--apex-border); }
            .main-content { overflow: visible; }
            .analysis-panel { flex-direction: column; }
            .sig-col { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--apex-border); }
            .chart-wrap { height: 160px; }
        }
    </style>
</head>
<body>

<div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"></div></div>

<header>
    <div>
        <div class="logo">APEX <span>CAPITAL</span></div>
        <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--apex-muted);margin-top:1px;">MARKET INTELLIGENCE TERMINAL v4.3</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
        <span class="live-label"><span class="live-dot"></span>LIVE</span>

</header>

<div class="search-bar">
    <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--apex-muted);">ADD →</span>
    <input id="symInput" placeholder="e.g. NVDA, GME, AMD" onkeypress="if(event.key==='Enter')addSymbol()">
    <button class="btn-track" onclick="addSymbol()">+ TRACK</button>

</div>

<div class="app-body">

    <div class="sidebar">

            <span id="watchCount" style="color:var(--apex-muted)">—</span>
        </div>

    <div class="main-content">

        <div class="chart-panel">
            <div class="chart-hdr">
                <div>
                    <div class="ch-sym" id="chSym">—</div>
                    <div class="ch-name" id="chName">SELECT A STOCK FROM THE WATCHLIST</div>
                </div>
                <div>
                    <div class="ch-price" id="chPrice">—</div>
                    <div class="ch-chg" id="chChg"></div>
                </div>
            </div>
            <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
            <div class="stats-row">
                <div class="stat"><div class="stat-lbl">OPEN</div><div class="stat-val" id="sOpen">—</div></div>
                <div class="stat"><div class="stat-lbl">HIGH</div><div class="stat-val" id="sHigh">—</div></div>
                <div class="stat"><div class="stat-lbl">LOW</div><div class="stat-val" id="sLow">—</div></div>

                </div>
                <div class="brief-body">
                    <div id="briefText">
                        <div class="placeholder">
                            <div>◈</div>
                            <div>CLICK A STOCK TO GENERATE ANALYSIS</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
const FKEY = 'd867m8hr01qnvdehbq10d867m8hr01qnvdehbq1g';
let symbols = ['AAPL','NVDA','TSLA','MSFT','META','AMZN'];
let currentSym = null;
let chart = null;
let profileCache = {};

// Clock
setInterval(() => {
    document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('en-US',{timeZone:'America/New_York',hour12:false}) + ' EST';
}, 1000);

// Ticker
const TSEED = [
    {s:'SPY',p:555.8,d:1.2},{s:'QQQ',p:484.2,d:2.1},{s:'AAPL',p:298.97,d:0.38},
    {s:'NVDA',p:220.61,d:-0.77},{s:'TSLA',p:404.11,d:1.47},{s:'MSFT',p:415.22,d:1.8},
    {s:'META',p:502.10,d:6.4},{s:'AMZN',p:185.6,d:0.9},{s:'GOOGL',p:175.3,d:-0.5},
    {s:'AMD',p:172.5,d:3.4},{s:'PLTR',p:24.8,d:0.6},{s:'COIN',p:220.4,d:-8.2}
];
document.getElementById('tickerTrack').innerHTML =
    [...TSEED,...TSEED].map(t=>`<div class="ticker-item">${t.s} <strong>$${t.p.toFixed(2)}</strong> <span class="${t.d>=0?'t-up':'t-down'}">${t.d>=0?'▲':'▼'}${Math.abs(t.d).toFixed(2)}%</span> &nbsp;·&nbsp;</div>`).join('');

// Finnhub fetches
async function getQuote(sym) {
    try {
        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FKEY}`);
        if (!r.ok) return null;
        const d = await r.json();
        return (d && d.c !== 0) ? d : null;
    } catch { return null; }
}

async function getProfile(sym) {
    if (profileCache[sym]) return profileCache[sym];
    try {
        const r = await fetch(`https://finnhub.io/api/v1/stock/profile2?symbol=${sym}&token=${FKEY}`);
        if (!r.ok) return {};
        const d = await r.json();
        profileCache[sym] = d;
        return d;
    } catch { return {}; }
}

async function getCandles(sym) {
    const now = Math.floor(Date.now() / 1000);
    const from = now - (90 * 24 * 60 * 60); // 90 days back ensures enough trading days
    try {
        const r = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${sym}&resolution=D&from=${from}&to=${now}&token=${FKEY}`);
        if (!r.ok) return null;
        const d = await r.json();
        return (d.s === 'ok' && d.c && d.c.length >= 5) ? d : null;
    } catch { return null; }
}

// Indicators
function sma(arr, n) {
    if (!arr || arr.length < n) return null;
    return arr.slice(-n).reduce((a,b)=>a+b,0)/n;
}
function ema(arr, n) {
    if (!arr || arr.length < n) return null;
    const k = 2/(n+1);
    let e = arr.slice(0,n).reduce((a,b)=>a+b,0)/n;
    for (let i=n; i<arr.length; i++) e = arr[i]*k + e*(1-k);
    return e;
}
function rsi(arr, n=14) {
    if (!arr || arr.length < n+1) return null;
    const d = arr.slice(1).map((p,i)=>p-arr[i]).slice(-n);
    const g = d.filter(x=>x>0).reduce((a,b)=>a+b,0)/n;
    const l = d.filter(x=>x<0).map(Math.abs).reduce((a,b)=>a+b,0)/n;
    return l===0 ? 100 : 100-(100/(1+g/l));
}
function bollingerBands(arr, n=20) {
    if (!arr || arr.length < n) return null;
    const s = arr.slice(-n);
    const mean = s.reduce((a,b)=>a+b,0)/n;
    const std = Math.sqrt(s.reduce((a,b)=>a+(b-mean)**2,0)/n);
    return { upper: mean+2*std, middle: mean, lower: mean-2*std };
}
function stochastic(hi, lo, cl, n=14) {
    if (!cl || cl.length < n) return null;
    const h = Math.max(...hi.slice(-n));
    const l = Math.min(...lo.slice(-n));
    return h===l ? 50 : ((cl[cl.length-1]-l)/(h-l))*100;
}
function volatility10(arr) {
    if (!arr || arr.length < 10) return null;
    const s = arr.slice(-10);
    const m = s.reduce((a,b)=>a+b,0)/10;
    return Math.sqrt(s.reduce((a,b)=>a+(b-m)**2,0)/10)/m*100;
}
function momentum(arr, n=10) {
    if (!arr || arr.length < n+1) return null;
    return ((arr[arr.length-1]-arr[arr.length-1-n])/arr[arr.length-1-n])*100;
}

// Signal engine
function runSignals(quote, candles) {
    if (!quote) return { rec:'—', score:50, signals:[], color:'var(--apex-muted)', bullFactors:[], bearFactors:[] };

    const c = candles?.c || [];
    const h = candles?.h || [];
    const l = candles?.l || [];
    const curr = quote.c;
    const dp = quote.dp || 0;

    let score = 50;
    const signals = [];
    const bullFactors = [];
    const bearFactors = [];

    // RSI
    const rsiVal = rsi(c);
    if (rsiVal !== null) {
        const rv = rsiVal.toFixed(1);
        if (rsiVal < 30)      { score+=22; signals.push({n:'RSI-14',v:rv,cls:'up'}); bullFactors.push(`RSI at ${rv} — deeply oversold, mean-reversion setup likely`); }
        else if (rsiVal < 42) { score+=10; signals.push({n:'RSI-14',v:rv,cls:'up'}); bullFactors.push(`RSI at ${rv} — leaning oversold, worth watching for bounce`); }
        else if (rsiVal > 70) { score-=22; signals.push({n:'RSI-14',v:rv,cls:'dn'}); bearFactors.push(`RSI at ${rv} — overbought, elevated pullback risk`); }
        else if (rsiVal > 60) { score-=8;  signals.push({n:'RSI-14',v:rv,cls:'dn'}); bearFactors.push(`RSI at ${rv} — approaching overbought territory`); }
        else                  { signals.push({n:'RSI-14',v:rv,cls:'nt'}); }
    }

    // SMA 20
    const s20 = sma(c, 20);
    if (s20 && curr) {
        const pct = ((curr-s20)/s20*100).toFixed(1);
        const abv = curr > s20;
        signals.push({n:'vs SMA-20', v:(abv?'+':'')+pct+'%', cls:abv?'up':'dn'});
        if (abv) { score+=6; bullFactors.push(`Price ${pct}% above 20-day SMA — uptrend intact`); }
        else     { score-=6; bearFactors.push(`Price ${Math.abs(pct)}% below 20-day SMA — trend broken`); }
    }

    // Golden/Death cross
    const s50 = sma(c, Math.min(50, c.length));
    if (s20 && s50) {
        const golden = s20 > s50;
        signals.push({n:'SMA Cross', v:golden?'GOLDEN':'DEATH', cls:golden?'up':'dn'});
        if (golden) { score+=12; bullFactors.push('Golden cross (SMA-20 > SMA-50) — bullish trend structure'); }
        else        { score-=12; bearFactors.push('Death cross (SMA-20 < SMA-50) — bearish trend structure'); }
    }

    // MACD (EMA12 - EMA26)
    if (c.length >= 26) {
        const e12 = ema(c,12), e26 = ema(c,26);
        const hist = e12-e26;
        signals.push({n:'MACD', v:(hist>0?'+':'')+hist.toFixed(2), cls:hist>0?'up':'dn'});
        if (hist > 0) { score+=8; bullFactors.push(`MACD positive (+${hist.toFixed(2)}) — bullish momentum confirmed`); }
        else          { score-=8; bearFactors.push(`MACD negative (${hist.toFixed(2)}) — bearish momentum`); }
    }

    // Bollinger Bands
    const bb = bollingerBands(c);
    if (bb && curr) {
        const range = bb.upper - bb.lower;
        const pct = range > 0 ? ((curr-bb.lower)/range*100).toFixed(0) : 50;
        let bState, bCls;
        if (curr <= bb.lower)       { bState='AT LOWER'; bCls='up';  score+=10; bullFactors.push('At lower Bollinger Band — statistical oversell, bounce zone'); }
        else if (curr >= bb.upper)  { bState='AT UPPER'; bCls='dn';  score-=10; bearFactors.push('At upper Bollinger Band — extended, reversal risk high'); }
        else if (parseInt(pct)>65)  { bState='UPPER HALF'; bCls='dn'; score-=3; }
        else if (parseInt(pct)<35)  { bState='LOWER HALF'; bCls='up'; score+=3; }
        else                        { bState='MID BAND'; bCls='nt'; }
        signals.push({n:'Bollinger', v:bState, cls:bCls});
    }

    // Stochastic
    const stoch = stochastic(h, l, c);
    if (stoch !== null) {
        const sv = stoch.toFixed(1);
        if (stoch < 20)      { score+=10; signals.push({n:'Stoch %K',v:sv,cls:'up'}); bullFactors.push(`Stochastic at ${sv} — oversold, buying pressure building`); }
        else if (stoch > 80) { score-=10; signals.push({n:'Stoch %K',v:sv,cls:'dn'}); bearFactors.push(`Stochastic at ${sv} — overbought`); }
        else                 { signals.push({n:'Stoch %K',v:sv,cls:'nt'}); }
    }

    // 10-day momentum
    const mom = momentum(c, 10);
    if (mom !== null) {
        const mv = mom.toFixed(1);
        signals.push({n:'10D Momentum',v:(mom>0?'+':'')+mv+'%',cls:mom>0?'up':'dn'});
        if (mom > 5)       { score+=6; bullFactors.push(`Strong 10-day momentum (+${mv}%) — trend has legs`); }
        else if (mom < -5) { score-=6; bearFactors.push(`Negative 10-day momentum (${mv}%) — sustained selling`); }
    }

    // 52-week range
    if (h.length > 0 && l.length > 0) {
        const hi52 = Math.max(...h), lo52 = Math.min(...l);
        const rangePct = hi52!==lo52 ? ((curr-lo52)/(hi52-lo52)*100).toFixed(0) : 50;
        const rp = parseInt(rangePct);
        signals.push({n:'52W Range', v:rangePct+'%', cls:rp>75?'dn':rp<25?'up':'nt'});
        if (rp < 25) { score+=5; bullFactors.push(`Near 52-week low (${rangePct}% of range) — potential value zone`); }
        if (rp > 80) { score-=5; bearFactors.push(`Near 52-week high (${rangePct}% of range) — extended valuation`); }
    }

    // Volatility
    const vol = volatility10(c);
    if (vol !== null) signals.push({n:'Volatility (10D)',v:vol.toFixed(1)+'%',cls:'nt'});

    // 1-day change
    if (Math.abs(dp) > 1.5) {
        signals.push({n:'Today',v:(dp>0?'+':'')+dp.toFixed(2)+'%',cls:dp>0?'up':'dn'});
        if (dp > 3)       { score+=5; bullFactors.push(`Strong day (+${dp.toFixed(2)}%) — institutional buying signal`); }
        else if (dp < -3) { score-=5; bearFactors.push(`Sharp drop today (${dp.toFixed(2)}%) — watch for follow-through`); }
    }

    score = Math.max(0, Math.min(100, score));

    let rec, color;
    if      (score >= 75) { rec='STRONG BUY';  color='var(--apex-green)'; }
    else if (score >= 62) { rec='BUY';          color='var(--apex-green)'; }
    else if (score <= 25) { rec='STRONG SELL';  color='var(--apex-red)'; }
    else if (score <= 38) { rec='SELL';         color='var(--apex-red)'; }
    else if (score >= 54) { rec='WATCH';        color='var(--apex-blue)'; }
    else                  { rec='HOLD';         color='var(--apex-gold)'; }

    return { rec, score, signals, color, bullFactors, bearFactors, bb, s20, vol };
}

// Brief generator
function generateBrief(sym, quote, a) {
    if (!quote) return '<div class="placeholder"><div>NO DATA</div></div>';
    const { rec, score, bullFactors, bearFactors, bb, s20, vol } = a;
    const curr = quote.c, dp = quote.dp||0;

    const outcomeLabel = {
        'STRONG BUY': `<span class="bb-up">STRONG BUY</span>`,
        'BUY':        `<span class="bb-up">BUY</span>`,
        'WATCH':      `<span class="bb-nt">WATCH</span>`,
        'HOLD':       `<span class="bb-nt">HOLD</span>`,
        'SELL':       `<span class="bb-dn">SELL</span>`,
        'STRONG SELL':`<span class="bb-dn">STRONG SELL</span>`,
    }[rec] || rec;

    const s20Str = s20 ? `$${s20.toFixed(2)}` : 'N/A';
    const bbRange = bb ? `$${bb.lower.toFixed(2)} – $${bb.upper.toFixed(2)}` : 'N/A';

    let rrLine = '';
    if (bb) {
        const up = ((bb.upper-curr)/curr*100).toFixed(1);
        const dn = ((curr-bb.lower)/curr*100).toFixed(1);
        rrLine = `Bollinger range: ${bbRange}. Upside to upper band: <span class="bb-up">+${up}%</span>. Downside to lower band: <span class="bb-dn">-${dn}%</span>.`;
    } else {
        rrLine = s20 ? `Key support/resistance: 20-day SMA at ${s20Str}.` : 'Limited candle data — levels unavailable.';
    }

    let actionLine;
    if (rec === 'STRONG BUY' || rec === 'BUY') {
        const stop = s20 ? (s20*0.97).toFixed(2) : (curr*0.95).toFixed(2);
        const tgt = bb ? bb.upper.toFixed(2) : (curr*1.08).toFixed(2);
        actionLine = `Entry near current levels ($${curr.toFixed(2)}). Stop below $${stop}. Target: $${tgt}.`;
    } else if (rec === 'STRONG SELL' || rec === 'SELL') {
        const tgt = bb ? bb.lower.toFixed(2) : (curr*0.93).toFixed(2);
        actionLine = `Avoid new longs. Downside target: $${tgt}. Any bounce toward ${s20Str} is a trim or short opportunity.`;
    } else if (rec === 'WATCH') {
        actionLine = `No position yet. Wait for RSI > 50 or a clean close above the 20-day SMA (${s20Str}) before committing.`;
    } else {
        actionLine = `No strong edge either direction. Wait for a cleaner setup — patience is a position.`;
    }

    const volLine = vol !== null
        ? (parseFloat(vol) > 3 ? `<span class="bb-dn">Elevated 10-day volatility (${parseFloat(vol).toFixed(1)}%)</span> — size positions carefully.`
                                : `Volatility contained at ${parseFloat(vol).toFixed(1)}% — clean technical environment.`)
        : '';

    const bullHTML = bullFactors.length ? bullFactors.slice(0,3).map(f=>`• ${f}`).join('<br>') : '<span style="color:var(--apex-muted)">No significant bull signals</span>';
    const bearHTML = bearFactors.length ? bearFactors.slice(0,3).map(f=>`• ${f}`).join('<br>') : '<span style="color:var(--apex-muted)">No significant bear signals</span>';

    return `
        <div class="brief-section">
            <div class="brief-section-title">OVERALL READ</div>
            <div class="brief-section-body">
                ${sym} scores <strong>${score}/100</strong> — signal is ${outcomeLabel}.
                Currently at <strong>$${curr.toFixed(2)}</strong>, ${dp>=0?`up <span class="bb-up">+${dp.toFixed(2)}%</span>`:`down <span class="bb-dn">${dp.toFixed(2)}%</span>`} today.
                20-day SMA at ${s20Str}. ${volLine}
            </div>
        </div>
        <div class="brief-section">
            <div class="brief-section-title">BULL CASE</div>
            <div class="brief-section-body">${bullHTML}</div>
        </div>
        <div class="brief-section">
            <div class="brief-section-title">BEAR CASE</div>
            <div class="brief-section-body">${bearHTML}</div>
        </div>
        <div class="brief-section">
            <div class="brief-section-title">RANGE & LEVELS</div>
            <div class="brief-section-body">${rrLine}</div>
        </div>
        <div class="brief-section">
            <div class="brief-section-title">ACTION</div>
            <div class="brief-section-body"><strong>${actionLine}</strong></div>
        </div>
    `;
}

// Chart
function renderChart(candles) {
    const ctx = document.getElementById('priceChart');
    if (chart) { chart.destroy(); chart = null; }
    if (!candles?.c?.length) return;
    const prices = candles.c;
    const labels = candles.t.map(ts=>new Date(ts*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'}));
    const isUp = prices[prices.length-1] >= prices[0];
    const lineColor = isUp ? '#00ff94' : '#ff2d55';
    chart = new Chart(ctx, {
        type:'line',
        data:{ labels, datasets:[{
            data:prices, borderColor:lineColor, borderWidth:2, tension:0.2,
            pointRadius:0, fill:true,
            backgroundColor:(ctx)=>{
                const {ctx:c,chartArea}=ctx.chart;
                if(!chartArea) return 'transparent';
                const g=c.createLinearGradient(0,chartArea.top,0,chartArea.bottom);
                g.addColorStop(0,isUp?'rgba(0,255,148,0.18)':'rgba(255,45,85,0.18)');
                g.addColorStop(1,'rgba(0,0,0,0)');
                return g;
            }
        }]},
        options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{
                legend:{display:false},
                tooltip:{
                    backgroundColor:'#111620',titleColor:'#f0a500',bodyColor:'#c8d6e5',
                    borderColor:'#1e2d40',borderWidth:1,
                    titleFont:{family:'Space Mono',size:10},
                    bodyFont:{family:'Space Mono',size:11},
                    callbacks:{label:c=>` $${c.parsed.y.toFixed(2)}`}
                }
            },
            scales:{
                y:{grid:{color:'rgba(30,45,64,0.5)'},ticks:{color:'#4a5568',font:{family:'Space Mono',size:9},callback:v=>'$'+v.toFixed(0)}},
                x:{grid:{display:false},ticks:{color:'#4a5568',font:{family:'Space Mono',size:9},maxTicksLimit:7}}
            }
        }
    });
}

// Watchlist
async function renderWatchlist() {
    const container = document.getElementById('watchlist');
    document.getElementById('watchCount').textContent = symbols.length + ' STOCKS';

    // Add new cards
    symbols.forEach(sym => {
        if (!document.getElementById(`card-${sym}`)) {
            const div = document.createElement('div');
            div.className = `stock-card${sym===currentSym?' active':''}`;
            div.id = `card-${sym}`;
            div.onclick = () => loadSymbol(sym);
            div.innerHTML = `<div class="sc-row1"><div class="sc-sym">${sym}</div><div class="sc-price nt">…</div></div><div class="sc-name" style="color:var(--apex-muted)">Loading…</div><div class="sc-badge b-HOLD">…</div>`;
            container.appendChild(div);
        }
    });

    // Update cards
    for (const sym of symbols) {
        (async () => {
            const q = await getQuote(sym);
            if (!q) return;
            const prof = await getProfile(sym);
            const chg = q.d||0, pct = q.dp||0;
            const cls = chg>=0?'up':'dn';
            const card = document.getElementById(`card-${sym}`);
            if (!card) return;
            card.innerHTML = `
                <div class="sc-row1">
                    <div class="sc-sym">${sym}</div>
                    <div class="sc-price ${cls}">$${q.c.toFixed(2)}</div>
                </div>
                <div class="sc-name">${prof.name||sym}</div>
                <div class="sc-row1" style="margin-top:5px">
                    <div class="sc-chg ${cls}">${chg>=0?'+':''}${pct.toFixed(2)}%</div>
                    <div class="sc-badge b-HOLD">…</div>
                </div>`;
            card.onclick = () => loadSymbol(sym);

            getCandles(sym).then(candles => {
                const { rec } = runSignals(q, candles);
                const badge = card.querySelector('.sc-badge');
                if (badge) { badge.className = `sc-badge b-${rec.replace(' ','-')}`; badge.textContent = rec; }
            });
        })();
    }

    document.getElementById('updatedLbl').textContent = 'UPDATED ' + new Date().toLocaleTimeString();
}

// Load symbol
async function loadSymbol(sym) {
    currentSym = sym;
    document.querySelectorAll('.stock-card').forEach(c=>c.classList.remove('active'));
    const card = document.getElementById(`card-${sym}`);
    if (card) card.classList.add('active');

    document.getElementById('chSym').textContent = sym;
    document.getElementById('chName').textContent = '—';
    document.getElementById('chPrice').textContent = '—';
    document.getElementById('chChg').textContent = '';
    document.getElementById('bigRec').textContent = '…';
    document.getElementById('bigRec').style.color = 'var(--apex-muted)';
    document.getElementById('scoreFill').style.width = '0%';
    document.getElementById('scoreLbl').textContent = 'LOADING…';
    document.getElementById('sigList').innerHTML = '';
    document.getElementById('briefText').innerHTML = '<div class="placeholder"><div>⟳</div><div>RUNNING ANALYSIS…</div></div>';

    const [quote, profile, candles] = await Promise.all([getQuote(sym), getProfile(sym), getCandles(sym)]);

    if (profile?.name) {
        document.getElementById('chName').textContent =
            profile.name.toUpperCase() + (profile.exchange ? ' · '+profile.exchange : '');
    }

    if (quote) {
        const chg = quote.d||0, pct = quote.dp||0;
        const cls = chg>=0?'up':'dn';
        document.getElementById('chPrice').textContent = `$${quote.c.toFixed(2)}`;
        const ce = document.getElementById('chChg');
        ce.className = 'ch-chg '+cls;
        ce.textContent = `${chg>=0?'+':''}$${chg.toFixed(2)}  (${chg>=0?'+':''}${pct.toFixed(2)}%)`;
        document.getElementById('sOpen').textContent = `$${quote.o.toFixed(2)}`;
        document.getElementById('sHigh').textContent = `$${quote.h.toFixed(2)}`;
        document.getElementById('sLow').textContent  = `$${quote.l.toFixed(2)}`;
        document.getElementById('sPrev').textContent = `$${quote.pc.toFixed(2)}`;
    }

    renderChart(candles);

    const analysis = runSignals(quote, candles);
    document.getElementById('bigRec').textContent = analysis.rec;
    document.getElementById('bigRec').style.color = analysis.color;

    const fc = analysis.score>=60?'var(--apex-green)':analysis.score<=40?'var(--apex-red)':'var(--apex-gold)';
    document.getElementById('scoreFill').style.background = fc;
    document.getElementById('scoreFill').style.width = analysis.score+'%';
    document.getElementById('scoreLbl').textContent = `SCORE: ${analysis.score}/100`;

    document.getElementById('sigList').innerHTML = analysis.signals.map(s=>
        `<div class="sig-row"><span class="sig-name">${s.n}</span><span class="sig-val ${s.cls}">${s.v}</span></div>`
    ).join('');

    document.getElementById('briefText').innerHTML = generateBrief(sym, quote, analysis);
}

// Add symbol
function addSymbol() {
    const input = document.getElementById('symInput');
    const sym = input.value.trim().toUpperCase().replace(/[^A-Z.]/g,'');
    if (sym && !symbols.includes(sym)) {
        symbols.unshift(sym);
        renderWatchlist();
        loadSymbol(sym);
    }
    input.value = '';
}

// Init
async function init() {
    renderWatchlist();
    await loadSymbol(symbols[0]);
    setInterval(()=>{ renderWatchlist(); if(currentSym) loadSymbol(currentSym); }, 60000);
}

window.onload = init;
</script>
